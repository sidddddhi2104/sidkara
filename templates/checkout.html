<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Siddhi's DIY Art Studio</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<section class="section-padding">

    <div class="section-title">
        <h2>Secure Checkout</h2>
        <p>Complete your handmade order beautifully.</p>
    </div>

    <div class="glass-card" style="max-width:800px; margin:auto; padding:50px;">

        <form method="POST">

            <div class="form-grid">

                <input type="text" name="fullname" placeholder="Full Name" required class="input-field">

                <input type="text" name="phone" placeholder="Phone Number" required class="input-field">

            </div>

            <textarea name="address" rows="5" placeholder="Shipping Address" required class="input-field"></textarea>

            <input type="text" name="total" value="₹699" readonly class="input-field">

            <button type="submit" class="primary-btn" style="border:none; width:100%;">
                Place Order
            </button>

        </form>

    </div>

</section>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
