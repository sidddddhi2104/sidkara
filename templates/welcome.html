<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Welcome | Sikara Studio</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <!-- GOOGLE FONTS -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="welcome-body">

    <!-- LUXURY BACKGROUND -->

    <div class="welcome-bg"></div>

    <!-- FLOATING BLOBS -->

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <!-- WELCOME CONTENT -->

    <section class="welcome-section">

        <div class="welcome-card">

            <span class="welcome-tag">
                ✨ Luxury Handmade Collection
            </span>

            <h1 class="welcome-title">

                Welcome To
                <span>Sikara Studio</span>

            </h1>

            <p class="welcome-text">

                Discover elegant handmade creations,
                artistic decor, premium candles,
                customized gifts and aesthetic luxury designs
                crafted with love and creativity.

            </p>

            <div class="welcome-buttons">

                <a href="/register"
                   class="primary-btn">

                    Start Shopping

                </a>

                <a href="/login"
                   class="secondary-btn">

                    Login

                </a>

            </div>

        </div>

    </section>

</body>

</html>
