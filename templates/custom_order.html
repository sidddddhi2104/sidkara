<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Custom Order</title>

   <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<a href="/" class="home-back-btn">
    Home
</a>
<section class="section-padding">

    <div class="section-title">
        <h2>Create Your Personalized Order</h2>
        <p>Upload your inspiration and requirements.</p>
    </div>

    <div class="glass-card" style="max-width:800px; margin:auto; padding:50px;">

        <form method="POST" enctype="multipart/form-data">

            <input type="text" name="customer_name" placeholder="Your Name" required class="input-field">

            <input type="text" name="phone" placeholder="Phone Number" required class="input-field">

            <textarea name="details" rows="6" placeholder="Describe your custom order" required class="input-field"></textarea>

            <input type="file" name="image" class="input-field" required>

            <button type="submit" class="primary-btn" style="width:100%; border:none;">
                Submit Custom Order
            </button>

        </form>

    </div>

</section>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
